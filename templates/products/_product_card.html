{% load static %}
<div class="col-6 col-md-4 col-lg-3 reveal">
    <div class="card product-card h-100 border-0 shadow-sm">
        <a href="{{ product.get_absolute_url }}">
            {% if product.image %}
                <img src="{{ product.image.url }}" class="card-img-top product-img" alt="{{ product.name }}">
            {% else %}
                <div class="product-img d-flex align-items-center justify-content-center bg-light">
                    <i class="bi bi-image fs-1 text-secondary"></i>
                </div>
            {% endif %}
        </a>
        <div class="card-body d-flex flex-column">
            <span class="badge bg-secondary-subtle text-secondary-emphasis mb-2 align-self-start">{{ product.category.name }}</span>
            <h6 class="card-title">
                <a href="{{ product.get_absolute_url }}" class="text-decoration-none text-dark">{{ product.name }}</a>
            </h6>
            <p class="fw-bold text-primary mb-2">${{ product.price }}</p>

            <div class="mt-auto d-flex gap-2">
                {% if product.in_stock %}
                <form action="{% url 'cart:cart_add' product.id %}" method="post" class="flex-grow-1">
                    {% csrf_token %}
                    <input type="hidden" name="quantity" value="1">
                    <button type="submit" class="btn btn-sm btn-primary w-100">
                        <i class="bi bi-cart-plus"></i> Add
                    </button>
                </form>
                {% else %}
                    <button class="btn btn-sm btn-secondary w-100" disabled>Out of stock</button>
                {% endif %}

                {% if user.is_authenticated %}
                <form action="{% url 'wishlist:wishlist_add' product.id %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Add to wishlist">
                        <i class="bi bi-heart"></i>
                    </button>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
</div>
